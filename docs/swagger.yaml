host: localhost:8080
info:
  contact:
    email: support@keyops.com
    name: API Support
  description: KeyOps 基础设施管理平台 API 文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: KeyOps API
  version: "2.0"
paths:
  /api/app-deploy-bindings:
    get:
      parameters:
      - description: 应用ID
        in: query
        name: applicationId
        type: string
      - description: '发布类型: jenkins, argocd'
        in: query
        name: deployType
        type: string
      - description: '环境: dev, test, qa, staging, prod'
        in: query
        name: environment
        type: string
      - description: 是否启用
        in: query
        name: enabled
        type: boolean
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
      summary: 获取应用-发布绑定列表
      tags:
      - app-deploy-bindings
    post:
      consumes:
      - application/json
      parameters:
      - description: 绑定信息
        in: body
        name: binding
        required: true
        schema:
          $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.CreateApplicationDeployBindingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
      summary: 创建应用-发布绑定
      tags:
      - app-deploy-bindings
  /api/app-deploy-bindings/{id}:
    delete:
      parameters:
      - description: 绑定ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
      summary: 删除应用-发布绑定
      tags:
      - app-deploy-bindings
    put:
      consumes:
      - application/json
      parameters:
      - description: 绑定ID
        in: path
        name: id
        required: true
        type: string
      - description: 绑定信息
        in: body
        name: binding
        required: true
        schema:
          $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.UpdateApplicationDeployBindingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
      summary: 更新应用-发布绑定
      tags:
      - app-deploy-bindings
  /api/app-deploy-bindings/applications:
    get:
      parameters:
      - description: '发布类型: jenkins, argocd'
        in: query
        name: deployType
        required: true
        type: string
      - description: '环境: dev, test, qa, staging, prod'
        in: query
        name: environment
        type: string
      - description: 应用名称关键字
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
      summary: 获取可用于发布的应用列表
      tags:
      - app-deploy-bindings
  /api/applications:
    get:
      parameters:
      - description: 应用名称（模糊搜索）
        in: query
        name: name
        type: string
      - description: 事业部
        in: query
        name: org
        type: string
      - description: 部门
        in: query
        name: department
        type: string
      - description: 应用状态
        in: query
        name: status
        type: string
      - description: 应用类型
        in: query
        name: srvType
        type: string
      - description: 虚拟化技术
        in: query
        name: virtualTech
        type: string
      - description: 应用站点
        in: query
        name: site
        type: string
      - description: 是否核心应用
        in: query
        name: isCritical
        type: boolean
      - description: 页码（与 pageSize 同时传时返回分页结构）
        in: query
        name: page
        type: integer
      - description: 每页条数
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
      summary: 获取应用列表
      tags:
      - applications
    post:
      consumes:
      - application/json
      parameters:
      - description: Application
        in: body
        name: application
        required: true
        schema:
          $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.CreateApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
      summary: 创建应用
      tags:
      - applications
  /api/applications/{id}:
    delete:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
      summary: 删除应用
      tags:
      - applications
    get:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
      summary: 获取单个应用
      tags:
      - applications
    put:
      consumes:
      - application/json
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Application
        in: body
        name: application
        required: true
        schema:
          $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.UpdateApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
      summary: 更新应用
      tags:
      - applications
  /api/approvals/{id}:
    put:
      consumes:
      - application/json
      description: 更新审批信息，主要用于标记发布状态
      parameters:
      - description: 审批ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新请求
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Approval'
              type: object
      summary: 更新审批
      tags:
      - 审批管理
  /api/bill/price:
    get:
      consumes:
      - application/json
      description: 获取单价管理列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fisker_zjump-backend_internal_model.Response'
      summary: 获取单价列表
      tags:
      - bill
    post:
      consumes:
      - application/json
